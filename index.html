<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeOS</title>

    <!-- Fonts: Fraunces (serif headlines/masthead) + Inter (body, UI, numbers),
         two weights each (regular 400 + medium 500). Loaded straight from
         Google Fonts with preconnect; display=swap means text shows instantly
         in a fallback and re-renders when the webfont arrives (no blank flash).
         Fraunces' opsz axis gives the nameplate a proper display cut. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
