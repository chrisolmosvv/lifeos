<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LifeOS — Today (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F5F1;
    --ink:#1C1916;
    --muted:#5C564C;
    --faint:#A8A096;
    --hair:rgba(28,25,22,.14);
    --hair-soft:rgba(28,25,22,.07);
    --accent:#C8643D;
    /* a few palette tints for blocks */
    --brick:#A85C44;
    --steel:#4E789C;
    --ochre:#A87B3A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;min-height:100%;
  }
  .scaps{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .tab{font-variant-numeric:tabular-nums;}

  /* ---------- MASTHEAD ---------- */
  .masthead{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:start;
    padding:30px 56px 18px;gap:24px;
  }
  .mh-left{justify-self:start;}
  .mh-right{justify-self:end;text-align:right;}
  .dateline{font-family:'Inter';font-weight:500;font-size:16px;line-height:1.3;letter-spacing:.01em;}
  .dateline .wk{color:var(--muted);}
  .dateline2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
  .mh-center{justify-self:center;text-align:center;}
  .wordmark{font-family:'UnifrakturMaguntia',serif;font-size:58px;line-height:.9;color:var(--ink);}
  .edition{margin-top:10px;}
  .temp{font-family:'Inter';font-weight:500;font-size:30px;line-height:1;letter-spacing:-.01em;}
  .mh-right .city{margin-bottom:9px;}
  .mh-right .cond{color:var(--muted);font-size:13px;margin-top:6px;}
  .sun{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--ochre);margin-right:5px;vertical-align:1px;}

  /* ---------- NAV ---------- */
  .nav{
    border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);
    display:flex;justify-content:center;gap:46px;padding:14px 0;
  }
  .nav a{
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    text-decoration:none;padding-bottom:3px;border-bottom:2px solid transparent;transition:color .2s;
  }
  .nav a:hover{color:var(--ink);}
  .nav a.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* ---------- MAIN ---------- */
  main{flex:1;display:flex;padding:26px 56px 30px;gap:0;min-height:0;}
  .col-cal{flex:1.35;display:flex;flex-direction:column;min-width:0;padding-right:40px;}
  .divider{width:1px;background:var(--hair);align-self:stretch;}
  .col-side{flex:1;display:flex;flex-direction:column;min-width:0;padding-left:40px;}

  /* day stepper — fixed arrow cluster */
  .daybar{display:flex;align-items:baseline;gap:18px;margin-bottom:14px;}
  .stepper{display:inline-flex;align-items:center;gap:2px;}
  .stepper button{
    appearance:none;border:none;background:none;cursor:pointer;color:var(--muted);
    width:30px;height:30px;border-radius:50%;font-size:18px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;
  }
  .stepper button:hover{background:var(--hair-soft);color:var(--ink);}
  .daytitle{font-family:'Fraunces';font-weight:600;font-size:30px;line-height:1;}
  .daystamp{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .backtoday{margin-left:auto;color:var(--accent);font-size:13px;cursor:pointer;opacity:0;transition:opacity .2s;}
  .backtoday.show{opacity:1;}
  .backtoday:hover{text-decoration:underline;}

  /* grid */
  .gridwrap{flex:1;overflow-y:auto;border-top:1px solid var(--ink);min-height:0;position:relative;}
  .grid{position:relative;}
  .hour{position:absolute;left:0;right:0;border-top:1px solid var(--hair-soft);}
  .hour .lbl{position:absolute;left:0;top:-7px;font-size:11px;color:var(--faint);letter-spacing:.04em;}
  .lane{position:absolute;left:54px;right:8px;top:0;bottom:0;}
  .block{
    position:absolute;border-radius:3px;padding:7px 10px;overflow:hidden;cursor:pointer;
    border-left:3px solid var(--blk,#999);background:var(--blkbg,rgba(0,0,0,.05));
    transition:filter .15s, transform .15s;
  }
  .block:hover{filter:brightness(.985);}
  .block .bt{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .block .bn{font-family:'Fraunces';font-size:15px;font-weight:500;margin-top:1px;}
  .nowline{position:absolute;left:46px;right:8px;height:2px;background:var(--accent);z-index:5;}
  .nowline::before{content:"";position:absolute;left:-5px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--accent);}

  /* side modules */
  .mod{margin-bottom:30px;}
  .mod-h{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);
    border-bottom:1px solid var(--ink);padding-bottom:8px;margin-bottom:18px;}
  .empty{font-family:'Fraunces';font-style:italic;font-size:18px;color:var(--muted);margin:4px 0 18px;}
  .addtask{color:var(--accent);font-size:15px;cursor:pointer;display:inline-block;}
  .addtask:hover{text-decoration:underline;}
  .taskrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--hair-soft);cursor:pointer;}
  .taskrow:hover{background:var(--hair-soft);margin:0 -10px;padding:9px 10px;}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .tname{font-family:'Fraunces';font-size:16px;flex:1;}
  .ttag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}

  .alltasks{margin-top:auto;margin-bottom:26px;border:1px solid var(--hair);border-radius:4px;
    display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;transition:border-color .2s;}
  .alltasks:hover{border-color:var(--ink);}
  .alltasks .lbl{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .alltasks .arr{color:var(--muted);}

  footer{text-align:center;font-family:'Fraunces';font-style:italic;color:var(--faint);
    font-size:14px;padding:18px 0 24px;}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
  .fade{animation:fade .35s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<header class="masthead">
  <div class="mh-left">
    <div class="dateline tab"><span id="clock">14:35</span> <span class="wk" id="wkday">Tuesday</span></div>
    <div class="dateline2" id="dmy">23 June 2026</div>
  </div>
  <div class="mh-center">
    <div class="wordmark">LifeOS</div>
    <div class="scaps edition" id="edition">YEAR 24 · DAY 87</div>
  </div>
  <div class="mh-right">
    <div class="scaps city">DELFT</div>
    <div><span class="temp">27°</span></div>
    <div class="cond"><span class="sun"></span>Mostly sunny</div>
  </div>
</header>

<nav class="nav">
  <a href="#" class="active">Today</a>
  <a href="#">Calendar</a>
  <a href="#">Settings</a>
</nav>

<main>
  <section class="col-cal">
    <div class="daybar">
      <span class="stepper">
        <button id="prev" aria-label="Previous day">‹</button>
        <button id="next" aria-label="Next day">›</button>
      </span>
      <span class="daytitle" id="dayTitle">The Day</span>
      <span class="daystamp" id="dayStamp">TUESDAY, JUNE 23, 2026</span>
      <span class="backtoday" id="backToday">Back to today</span>
    </div>
    <div class="gridwrap" id="gridwrap">
      <div class="grid" id="grid"></div>
    </div>
  </section>

  <div class="divider"></div>

  <aside class="col-side">
    <div class="mod">
      <div class="mod-h" id="tasksHead">TASKS TODAY</div>
      <div id="tasksBody"></div>
      <span class="addtask">+ add a task</span>
    </div>
    <div class="mod">
      <div class="mod-h">THE NEXT 7 DAYS</div>
      <div class="empty">The week ahead is open.</div>
    </div>
    <div class="alltasks">
      <span class="lbl">All tasks · 0</span>
      <span class="arr">→</span>
    </div>
  </aside>
</main>

<script>
  // ---- live clock + personal edition (dynamic, correct on any date) ----
  function pad(n){return String(n).padStart(2,'0');}
  const DOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  function tickClock(){
    const n=new Date();
    document.getElementById('clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
    document.getElementById('wkday').textContent=DOW[n.getDay()];
    document.getElementById('dmy').textContent=n.getDate()+' '+MON[n.getMonth()]+' '+n.getFullYear();
  }
  tickClock(); setInterval(tickClock,1000);

  function personalEdition(now){
    const B={y:2002,m:2,d:29}; // March = month index 2
    let lb=new Date(now.getFullYear(),B.m,B.d);
    if(now < lb) lb=new Date(now.getFullYear()-1,B.m,B.d);
    const age=lb.getFullYear()-B.y;
    const day=Math.floor((stripT(now)-stripT(lb))/86400000)+1; // birthday = Day 1
    return {age,day};
  }
  function stripT(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();}
  (function(){
    const e=personalEdition(new Date());
    document.getElementById('edition').textContent='YEAR '+e.age+' · DAY '+e.day;
  })();

  // ---- seed data so day-flipping feels real (matches your screenshots) ----
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  // events keyed by offset from today (0 = Tue Jun 23)
  const EVENTS={
    1:[{s:13.5,e:16.5,t:'13:30–16:30',n:'CFD Exam',c:'var(--brick)',bg:'rgba(168,92,68,.13)'}],
    2:[{s:10,e:11,t:'10:00–11:00',n:'cfd meeting',c:'var(--steel)',bg:'rgba(78,120,156,.12)'},
       {s:16.75,e:21,t:'16:45–21:00',n:'EFPT BBQ',c:'var(--ochre)',bg:'rgba(168,123,58,.13)'}]
  };
  const GS=7, GE=24, HH=64; // grid 7am→midnight, 64px/hr

  let offset=0;
  function viewedDate(){const d=new Date();d.setDate(d.getDate()+offset);return d;}

  function buildGrid(){
    const grid=document.getElementById('grid');
    grid.style.height=((GE-GS)*HH)+'px';
    let html='';
    for(let h=GS;h<=GE;h++){
      const label=h===24?'':( (h%12||12)+' '+(h<12?'AM':'PM') );
      html+='<div class="hour" style="top:'+((h-GS)*HH)+'px"><span class="lbl">'+label+'</span></div>';
    }
    html+='<div class="lane" id="lane"></div>';
    grid.innerHTML=html;

    const lane=document.getElementById('lane');
    const evs=EVENTS[offset]||[];
    evs.forEach(ev=>{
      const top=(ev.s-GS)*HH, hgt=(ev.e-ev.s)*HH;
      const b=document.createElement('div');
      b.className='block';
      b.style.top=top+'px'; b.style.height=hgt+'px';
      b.style.setProperty('--blk',ev.c); b.style.setProperty('--blkbg',ev.bg);
      b.innerHTML='<div class="bt">'+ev.t+'</div><div class="bn">'+ev.n+'</div>';
      lane.appendChild(b);
    });

    // now-line only on the real today
    if(offset===0){
      const n=new Date(); const frac=n.getHours()+n.getMinutes()/60;
      if(frac>=GS && frac<=GE){
        const nl=document.createElement('div');
        nl.className='nowline'; nl.style.top=((frac-GS)*HH)+'px';
        grid.appendChild(nl);
      }
    }
  }

  function render(){
    const d=viewedDate();
    document.getElementById('dayTitle').textContent = offset===0 ? 'The Day' : DAYS[d.getDay()];
    document.getElementById('dayStamp').textContent =
      (DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()).toUpperCase();
    document.getElementById('tasksHead').textContent = offset===0 ? 'TASKS TODAY' : DAYS[d.getDay()].toUpperCase();
    document.getElementById('backToday').classList.toggle('show', offset!==0);

    const empty = offset===0 ? 'Nothing due today — a calm one.' : 'Nothing on this day.';
    document.getElementById('tasksBody').innerHTML='<div class="empty">'+empty+'</div>';

    const grid=document.getElementById('grid');
    grid.classList.remove('fade'); void grid.offsetWidth; grid.classList.add('fade');
    buildGrid();
  }

  document.getElementById('prev').onclick=()=>{offset--;render();};
  document.getElementById('next').onclick=()=>{offset++;render();};
  document.getElementById('backToday').onclick=()=>{offset=0;render();};

  render();
  // open scrolled near the working day
  document.getElementById('gridwrap').scrollTop=(8-GS)*HH;
</script>
</body>
</html>
